# CI skeleton (stage S0). Later stages add: golangci-lint, the sim soak
# (fixed regression seeds + fresh random seeds), the determinism gate
# (rerun seeds, byte-compare trace hashes), and a bench smoke run that
# asserts nothing about throughput.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race detector)
        run: go test ./... -race
